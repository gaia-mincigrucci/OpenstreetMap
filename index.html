<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chiamata API Open Street Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="controls">
        <input type="number" id="lat" placeholder="Latitudine" step="any">
        <input type="number" id="lng" placeholder="Longitudine" step="any">
        <button id="btn-update">Vai alle Coordinate</button>
        <button id="btn-gps" class="gps-btn">Posizione attuale</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
